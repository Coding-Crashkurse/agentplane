# agentplane local platform stack (SPEC §7.3).
#
# All client-visible URLs go through traefik + agentgateway; the registry and
# runtime are never exposed directly. Bring it up with:
#
#   docker compose -f deploy/compose/compose.yaml up -d --wait

name: agentplane

services:
  traefik:
    image: traefik:v3.3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agentplane
      POSTGRES_PASSWORD: agentplane
      POSTGRES_DB: agentplane
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentplane"]
      interval: 5s
      timeout: 3s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/keycloak
      KC_DB_USERNAME: agentplane
      KC_DB_PASSWORD: agentplane
      KC_HOSTNAME: auth.localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/agentplane-realm.json:/opt/keycloak/data/import/agentplane-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.keycloak.rule: Host(`auth.localhost`)
      traefik.http.services.keycloak.loadbalancer.server.port: "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/agentplane HTTP/1.0\\n' >&3 && head -1 <&3 | grep -q 200",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://agentplane:agentplane@postgres/langfuse
      NEXTAUTH_URL: http://langfuse.localhost
      NEXTAUTH_SECRET: local-dev-secret-change-me
      SALT: local-dev-salt-change-me
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: agentplane
      LANGFUSE_INIT_PROJECT_ID: agentplane
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: pk-lf-local
      LANGFUSE_INIT_PROJECT_SECRET_KEY: sk-lf-local
      LANGFUSE_INIT_USER_EMAIL: admin@example.com
      LANGFUSE_INIT_USER_PASSWORD: admin12345
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.langfuse.rule: Host(`langfuse.localhost`)
      traefik.http.services.langfuse.loadbalancer.server.port: "3000"

  agentgateway:
    image: ghcr.io/agentgateway/agentgateway:latest
    command: ["-f", "/etc/agentgateway/config.yaml"]
    volumes:
      - ./agentgateway/config.yaml:/etc/agentgateway/config.yaml:ro
    environment:
      # forwarded to the LLM provider route; set in deploy/compose/.env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - runtime
    labels:
      traefik.enable: "true"
      traefik.http.routers.gateway.rule: Host(`api.localhost`)
      traefik.http.services.gateway.loadbalancer.server.port: "3000"

  registry:
    build:
      context: ../..
      dockerfile: deploy/compose/registry.Dockerfile
    environment:
      AGENTPLANE_REGISTRY_DB_URL: postgresql+asyncpg://agentplane:agentplane@postgres/registry
      AGENTPLANE_REGISTRY_AUTH_MODE: oidc
      AGENTPLANE_REGISTRY_OIDC_ISSUER: http://keycloak:8080/realms/agentplane
      AGENTPLANE_REGISTRY_OIDC_AUDIENCE: agentplane
      AGENTPLANE_REGISTRY_HEALTH_INTERVAL_S: "60"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://langfuse:3000/api/public/otel
      OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Basic cGstbGYtbG9jYWw6c2stbGYtbG9jYWw="
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  runtime:
    build:
      context: ../..
      dockerfile: deploy/compose/runtime.Dockerfile
    environment:
      AGENTPLANE_RUNTIME_DB_URL: postgresql+asyncpg://agentplane:agentplane@postgres/runtime
      AGENTPLANE_RUNTIME_PUBLIC_BASE_URL: http://api.localhost
      AGENTPLANE_RUNTIME_REGISTRY_URL: http://registry:8100
      AGENTPLANE_RUNTIME_SECRET_KEY: ${AGENTPLANE_RUNTIME_SECRET_KEY:-eXktLU5vdC1Gb3ItUHJvZC1Vc2UtT25seS1EZXYtS2V5PQ==}
      AGENTPLANE_RUNTIME_LLM_BASE_URL: http://agentgateway:3000/v1
      AGENTPLANE_RUNTIME_AUTH_MODE: oidc
      AGENTPLANE_RUNTIME_OIDC_ISSUER: http://keycloak:8080/realms/agentplane
      AGENTPLANE_RUNTIME_OIDC_AUDIENCE: agentplane
      OTEL_EXPORTER_OTLP_ENDPOINT: http://langfuse:3000/api/public/otel
      OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Basic cGstbGYtbG9jYWw6c2stbGYtbG9jYWw="
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  pgdata:
