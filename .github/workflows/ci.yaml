name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff check
        run: uv run ruff check .

      - name: mypy (strict)
        run: uv run mypy

      - name: import-linter contracts
        run: uv run lint-imports

      - name: Unit tests
        run: uv run pytest -q

      - name: JSON Schema is current
        run: |
          uv run python -m agentplane_core.schema_export > schemas/flow-definition.schema.json
          git diff --exit-code schemas/

  integration:
    # Integration/smoke run on a schedule and before releases, not per push.
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Smoke test
        run: ./scripts/smoke.sh
