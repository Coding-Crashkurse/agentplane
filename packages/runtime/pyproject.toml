[project]
name = "agentplane-runtime"
version = "0.0.4"
description = "agentplane runtime: definitions, resources, flow execution, A2A + MCP serving"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "agentplane-core>=0.0.3,<0.1.0",
    "agentplane-sdk>=0.0.3,<0.1.0",
    "a2a-sdk[http-server]>=1.1,<2",
    "fastapi>=0.115",
    "sqlalchemy[asyncio]>=2.0.30",
    "alembic>=1.13",
    "aiosqlite>=0.20",
    "httpx>=0.27",
    "pydantic-settings>=2.4",
    "pyjwt[crypto]>=2.9",
    "cryptography>=43",
    "langgraph>=1.0,<2",
    # exact pin — fastmcp ships breaking changes in minor releases (CLAUDE.md)
    "fastmcp==3.4.4",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-http>=1.27",
    "uvicorn>=0.30",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.29", "pgvector>=0.3"]

[project.scripts]
agentplane-runtime = "agentplane_runtime.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentplane_runtime"]

[tool.uv.sources]
agentplane-core = { workspace = true }
agentplane-sdk = { workspace = true }
